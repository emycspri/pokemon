name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web (Expo static export)
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_WS_URL: ${{ secrets.EXPO_PUBLIC_WS_URL }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Prepare static deploy config
        run: |
          cat > ./dist/vercel.json << 'EOF'
          {
            "framework": null,
            "buildCommand": null,
            "installCommand": null,
            "headers": [
              {
                "source": "/(.*)\\.wasm",
                "headers": [{ "key": "Content-Type", "value": "application/wasm" }]
              }
            ],
            "rewrites": [
              { "source": "/((?!assets|_expo|favicon\\.ico|.*\\.html|.*\\.js|.*\\.css|.*\\.wasm|.*\\.png|.*\\.jpg|.*\\.svg|.*\\.ttf|.*\\.json).*)", "destination": "/index.html" }
            ]
          }
          EOF

      - name: Deploy to Vercel
        run: vercel deploy ./dist --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
